# Test isolation: do not load user machine overrides
spring.config.import=

# SQLite datasource for tests (file in target/ so it is cleaned by mvn clean)
spring.datasource.url=jdbc:sqlite:./target/sentria-test.db
spring.datasource.driver-class-name=org.sqlite.JDBC

# Flyway must point to the same test database
spring.flyway.url=jdbc:sqlite:./target/sentria-test.db
spring.flyway.enabled=true

# Keep tests deterministic and fast
spring.task.scheduling.enabled=false

# Disable external side effects
notifications.ntfy.enabled=false
ai.enabled=false
ai.formatting.enabled=false

# Monitoring properties required for context startup
monitoring.enabled=true
monitoring.interval-seconds=10
monitoring.summary-interval-seconds=180
monitoring.process-interval-seconds=60
monitoring.verdict-interval-seconds=86400
monitoring.verdict-report-days=3
monitoring.verdict-top-processes=5
monitoring.retention-days=30
monitoring.battery-full-percent-threshold=99.5
monitoring.ssd-low-health-percent-threshold=20
monitoring.ssd-high-write-delta-gb-threshold=5
monitoring.storage-low-free-gb-threshold=15

# Ensure SSD collector is active in integration tests
monitoring.collectors=hardware,ssd

# App properties
app.name=Sentria
app.device-name=test-device

# MCP server (required by autoconfiguration)
spring.ai.mcp.server.enabled=true
spring.ai.mcp.server.name=sentria-agent
spring.ai.mcp.server.version=1.0.0
spring.ai.mcp.server.instructions=MCP server for Sentria monitoring tools
spring.ai.mcp.server.sse-message-endpoint=/mcp/messages
spring.ai.mcp.server.sse-endpoint=/mcp/sse
spring.ai.mcp.server.capabilities.tool=true
spring.ai.mcp.server.capabilities.resource=true
spring.ai.mcp.server.capabilities.prompt=true
spring.ai.mcp.server.capabilities.completion=true
spring.main.allow-bean-definition-overriding=true

# OpenAI stub key (satisfies autoconfiguration; no real calls made in tests)
spring.ai.openai.api-key=dummy-key-not-used-in-tests

# Storage / SMART Settings
storage.smart.enabled=true
storage.smart.binary-path=
storage.smart.discovery-enabled=true
storage.smart.prefer-smartctl=true

# AI provider
ai.provider=openai
ai.model=gpt-4o-mini
ai.timeout-seconds=30
ai.openai-api-key=
ai.openrouter-api-key=
ai.groq-api-key=
ai.custom-api-key=
ai.custom-base-url=
ai.formatting.max-consecutive-auth-failures=2
ai.formatting.cooldown-seconds=1800

# Notifications
notifications.provider=ntfy
notifications.ntfy.server-url=https://ntfy.sh
notifications.ntfy.topic=sentria-test-topic


