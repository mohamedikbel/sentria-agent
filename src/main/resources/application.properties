# App Properties
app.name=Sentria
app.device-name=${COMPUTERNAME:${HOSTNAME:My PC}}

# Optional user override file generated by: java -jar sentria-agent.jar --setup
# Order: user home (stable), project root, then when running from target/.
spring.config.import=optional:file:${user.home}/.sentria/sentria-user.properties,optional:file:./config/sentria-user.properties,optional:file:../config/sentria-user.properties

# Monitoring Properties
monitoring.enabled=true
monitoring.interval-seconds=10
monitoring.collectors=hardware,ssd
monitoring.summary-interval-seconds=180
monitoring.process-interval-seconds=60
monitoring.verdict-interval-seconds=86400
monitoring.verdict-report-days=3
monitoring.verdict-top-processes=5
monitoring.retention-days=30
monitoring.battery-full-percent-threshold=99.5
monitoring.ssd-low-health-percent-threshold=20
monitoring.ssd-high-write-delta-gb-threshold=5
monitoring.storage-low-free-gb-threshold=15

# Notifications & ntfy Properties
notifications.provider=ntfy
notifications.ntfy.enabled=true
notifications.ntfy.server-url=https://ntfy.sh
notifications.ntfy.topic=sentria-demo-topic


# Storage / SMART Settings
storage.smart.enabled=true
storage.smart.binary-path=
storage.smart.discovery-enabled=true
storage.smart.prefer-smartctl=true

# AI formatting resilience
ai.formatting.enabled=true
ai.formatting.max-consecutive-auth-failures=2
ai.formatting.cooldown-seconds=1800

# AI provider selection (openai | openrouter | groq | custom)
ai.enabled=true
ai.provider=openai
ai.model=gpt-4o-mini
ai.timeout-seconds=30

# Provider keys (set by user / environment for production)
ai.openai-api-key=${OPENAI_API_KEY:}
ai.openrouter-api-key=${OPENROUTER_API_KEY:}
ai.groq-api-key=${GROQ_API_KEY:}

# Custom OpenAI-compatible endpoint
ai.custom-api-key=${CUSTOM_AI_API_KEY:}
ai.custom-base-url=${CUSTOM_AI_BASE_URL:}

# MCP server settings
spring.main.allow-bean-definition-overriding=true
spring.ai.mcp.server.enabled=true
spring.ai.mcp.server.name=sentria-agent
spring.ai.mcp.server.version=1.0.0
spring.ai.mcp.server.instructions=MCP server for Sentria monitoring tools
spring.ai.mcp.server.sse-message-endpoint=/mcp/messages
spring.ai.mcp.server.sse-endpoint=/mcp/sse
spring.ai.mcp.server.capabilities.tool=true
spring.ai.mcp.server.capabilities.resource=true
spring.ai.mcp.server.capabilities.prompt=true
spring.ai.mcp.server.capabilities.completion=true
logging.file.name=./spring-mcp-server.log

# Spring Datasource (SQLite)
spring.datasource.url=jdbc:sqlite:${SENTRIA_DB_PATH:${user.home}/sentria.db}
spring.datasource.driver-class-name=org.sqlite.JDBC

# Flyway Migrations
spring.flyway.enabled=true
spring.flyway.url=jdbc:sqlite:${SENTRIA_DB_PATH:${user.home}/sentria.db}
spring.flyway.locations=classpath:db/migration


# Keep starter satisfied; real provider selection/keys are handled by ai.* above.
spring.ai.openai.api-key=${OPENAI_API_KEY:dummy-key-not-used-by-custom-client}
